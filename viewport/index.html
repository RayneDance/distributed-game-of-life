<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Distributed Game of Life</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            overflow: hidden;
            background: #080810;
            color: #fff;
            font-family: 'Courier New', monospace;
        }

        canvas {
            display: block;
        }

        /* ── HUD ─────────────────────────────────────────────────────── */
        #hud {
            position: absolute;
            top: 12px;
            left: 12px;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(6px);
            padding: 10px 14px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            pointer-events: none;
            font-size: 12px;
            line-height: 1.7;
        }

        #hud h3 {
            font-size: 13px;
            color: #00ff88;
            margin-bottom: 4px;
            letter-spacing: 1px;
        }

        #status {
            font-weight: bold;
        }

        #pos {
            color: rgba(255, 255, 255, 0.5);
            font-size: 11px;
        }

        #help {
            color: rgba(255, 255, 255, 0.35);
            font-size: 10px;
            margin-top: 6px;
        }

        #mode-badge {
            display: inline-block;
            margin-top: 5px;
            padding: 2px 8px;
            border-radius: 4px;
            background: rgba(0, 255, 136, 0.15);
            border: 1px solid rgba(0, 255, 136, 0.3);
            color: #00ff88;
            font-size: 10px;
            letter-spacing: 0.5px;
        }

        /* Rate limit budget bar */
        #rl-wrap {
            margin-top: 7px;
        }

        #rl-label {
            font-size: 9px;
            color: rgba(255, 255, 255, 0.3);
            display: flex;
            justify-content: space-between;
            margin-bottom: 3px;
        }

        #rl-track {
            height: 4px;
            border-radius: 2px;
            background: rgba(255, 255, 255, 0.07);
            overflow: hidden;
        }

        #rl-fill {
            height: 100%;
            border-radius: 2px;
            width: 100%;
            transition: width 0.2s linear, background-color 0.4s ease;
            background: #00ff88;
        }

        /* ── Shape Picker Panel ──────────────────────────────────────── */
        #shape-panel {
            position: absolute;
            right: 12px;
            top: 12px;
            bottom: 12px;
            width: 220px;
            background: rgba(8, 8, 20, 0.88);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            font-size: 12px;
            transition: width 0.22s ease;
        }

        /* Collapsed: only the header strip is shown */
        #shape-panel.collapsed {
            bottom: auto;
            /* don't stretch full height when collapsed */
            width: 44px;
        }

        #shape-panel.collapsed .panel-body {
            display: none;
        }

        #shape-panel.collapsed #shape-panel-header h4,
        #shape-panel.collapsed #category-tabs {
            display: none;
        }

        /* Header row: title + toggle button side by side */
        #shape-panel-header {
            padding: 8px 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.07);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 8px;
            min-height: 44px;
        }

        #shape-panel-header h4 {
            flex: 1;
            font-size: 11px;
            color: #00ff88;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 6px;
            /* Push tabs below the header row */
            align-self: flex-start;
            padding-top: 2px;
        }

        /* Wrap title + tabs in a column so toggle sits beside them */
        #header-text {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 6px;
            min-width: 0;
        }

        #panel-toggle {
            flex-shrink: 0;
            width: 28px;
            height: 28px;
            border-radius: 6px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s ease;
            font-family: inherit;
            align-self: flex-start;
        }

        #panel-toggle:hover {
            background: rgba(0, 255, 136, 0.15);
            border-color: rgba(0, 255, 136, 0.4);
            color: #00ff88;
        }

        /* Category tabs */
        #category-tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
        }

        .cat-tab {
            padding: 3px 8px;
            border-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            background: transparent;
            color: rgba(255, 255, 255, 0.45);
            font-size: 10px;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.15s ease;
        }

        .cat-tab:hover {
            border-color: rgba(0, 255, 136, 0.35);
            color: rgba(255, 255, 255, 0.8);
        }

        .cat-tab.active {
            background: rgba(0, 255, 136, 0.15);
            border-color: rgba(0, 255, 136, 0.5);
            color: #00ff88;
        }

        /* Shape list */
        #shape-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
            display: flex;
            flex-direction: column;
            gap: 5px;
            scrollbar-width: thin;
            scrollbar-color: rgba(0, 255, 136, 0.2) transparent;
        }

        #shape-list::-webkit-scrollbar {
            width: 4px;
        }

        #shape-list::-webkit-scrollbar-thumb {
            background: rgba(0, 255, 136, 0.2);
            border-radius: 2px;
        }

        #shape-list::-webkit-scrollbar-track {
            background: transparent;
        }

        .shape-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 7px 8px;
            border-radius: 7px;
            border: 1px solid rgba(255, 255, 255, 0.07);
            background: rgba(255, 255, 255, 0.03);
            cursor: pointer;
            transition: all 0.15s ease;
            text-align: left;
            color: rgba(255, 255, 255, 0.75);
            font-family: inherit;
            font-size: 11px;
        }

        .shape-btn:hover {
            background: rgba(0, 255, 136, 0.08);
            border-color: rgba(0, 255, 136, 0.25);
            color: #fff;
        }

        .shape-btn.selected {
            background: rgba(0, 255, 136, 0.15);
            border-color: rgba(0, 255, 136, 0.55);
            color: #00ff88;
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.1);
        }

        .shape-preview {
            flex-shrink: 0;
            width: 40px;
            height: 40px;
            border-radius: 4px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.06);
            image-rendering: pixelated;
        }

        .shape-label {
            line-height: 1.3;
        }

        .shape-label small {
            display: block;
            color: rgba(255, 255, 255, 0.3);
            font-size: 9px;
            margin-top: 1px;
        }

        /* Footer */
        #shape-panel-footer {
            padding: 8px 12px;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            color: rgba(255, 255, 255, 0.25);
            font-size: 9px;
            flex-shrink: 0;
        }

        #clear-btn {
            display: block;
            width: 100%;
            margin-bottom: 6px;
            padding: 5px;
            border-radius: 5px;
            border: 1px solid rgba(255, 80, 80, 0.25);
            background: rgba(255, 80, 80, 0.08);
            color: rgba(255, 100, 100, 0.7);
            font-family: inherit;
            font-size: 10px;
            cursor: pointer;
            transition: all 0.15s ease;
        }

        #clear-btn:hover {
            background: rgba(255, 80, 80, 0.18);
            border-color: rgba(255, 80, 80, 0.5);
            color: #ff6666;
        }

        #open-editor-btn {
            display: block;
            width: 100%;
            margin-bottom: 6px;
            padding: 5px;
            border-radius: 5px;
            border: 1px solid rgba(0, 170, 255, 0.25);
            background: rgba(0, 170, 255, 0.07);
            color: rgba(80, 200, 255, 0.7);
            font-family: inherit;
            font-size: 10px;
            cursor: pointer;
            transition: all 0.15s ease;
        }

        #open-editor-btn:hover {
            background: rgba(0, 170, 255, 0.16);
            border-color: rgba(0, 170, 255, 0.5);
            color: #40d0ff;
        }

        /* ── Piece Editor Modal ───────────────────────────────────────── */
        #piece-editor-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(4, 4, 14, 0.85);
            backdrop-filter: blur(8px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        #piece-editor-overlay.open {
            display: flex;
        }

        #piece-editor {
            background: rgba(10, 10, 26, 0.97);
            border: 1px solid rgba(0, 170, 255, 0.2);
            border-radius: 14px;
            box-shadow: 0 0 60px rgba(0, 170, 255, 0.12), 0 0 0 1px rgba(255, 255, 255, 0.04);
            display: flex;
            flex-direction: column;
            gap: 14px;
            padding: 20px 22px;
            max-width: 96vw;
            max-height: 96vh;
            overflow: auto;
            animation: editorIn 0.18s ease;
        }

        @keyframes editorIn {
            from {
                opacity: 0;
                transform: scale(0.96) translateY(6px);
            }

            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        #editor-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        #editor-header h3 {
            font-size: 14px;
            color: #40d0ff;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        #editor-close {
            width: 28px;
            height: 28px;
            border-radius: 6px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            background: rgba(255, 255, 255, 0.04);
            color: rgba(255, 255, 255, 0.55);
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s ease;
            font-family: inherit;
            flex-shrink: 0;
        }

        #editor-close:hover {
            background: rgba(255, 80, 80, 0.15);
            border-color: rgba(255, 80, 80, 0.4);
            color: #ff6666;
        }

        #editor-meta {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
        }

        .editor-field label {
            display: block;
            font-size: 9px;
            color: rgba(255, 255, 255, 0.35);
            letter-spacing: 0.8px;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .editor-field input {
            width: 100%;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            color: #fff;
            font-family: inherit;
            font-size: 11px;
            padding: 5px 8px;
            outline: none;
            transition: border-color 0.15s ease;
        }

        .editor-field input:focus {
            border-color: rgba(0, 170, 255, 0.5);
        }

        #editor-canvas-wrap {
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.07);
            border-radius: 8px;
            cursor: crosshair;
            /* fixed display size — scaled internally */
            width: 500px;
            height: 500px;
            flex-shrink: 0;
            align-self: center;
        }

        #editor-canvas {
            width: 500px;
            height: 500px;
            image-rendering: pixelated;
            display: block;
        }

        #editor-toolbar {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .ed-btn {
            padding: 5px 12px;
            border-radius: 6px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.04);
            color: rgba(255, 255, 255, 0.6);
            font-family: inherit;
            font-size: 10px;
            cursor: pointer;
            transition: all 0.15s ease;
        }

        .ed-btn:hover {
            background: rgba(255, 255, 255, 0.09);
            color: #fff;
        }

        .ed-btn.active {
            background: rgba(0, 170, 255, 0.15);
            border-color: rgba(0, 170, 255, 0.45);
            color: #40d0ff;
        }

        #editor-cell-count {
            margin-left: auto;
            font-size: 10px;
            color: rgba(255, 255, 255, 0.3);
        }

        #editor-footer {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
        }

        #editor-accept {
            padding: 7px 20px;
            border-radius: 7px;
            border: 1px solid rgba(0, 255, 136, 0.4);
            background: rgba(0, 255, 136, 0.12);
            color: #00ff88;
            font-family: inherit;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.15s ease;
        }

        #editor-accept:hover {
            background: rgba(0, 255, 136, 0.22);
            border-color: rgba(0, 255, 136, 0.65);
            box-shadow: 0 0 12px rgba(0, 255, 136, 0.15);
        }

        #editor-cancel {
            padding: 7px 16px;
            border-radius: 7px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: transparent;
            color: rgba(255, 255, 255, 0.45);
            font-family: inherit;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.15s ease;
        }

        #editor-cancel:hover {
            border-color: rgba(255, 255, 255, 0.25);
            color: rgba(255, 255, 255, 0.8);
        }

        #editor-zoom-info {
            font-size: 9px;
            color: rgba(255, 255, 255, 0.2);
            text-align: center;
        }

        /* Mobile: anchor to bottom-right, default collapsed */
        @media (max-width: 600px) {
            #shape-panel {
                top: auto;
                bottom: 12px;
                right: 12px;
            }

            #hud {
                font-size: 11px;
            }
        }
    </style>
</head>

<body>
    <div id="hud">
        <h3>GAME OF LIFE</h3>
        <p>Status: <span id="status">Connecting…</span></p>
        <p id="pos"></p>
        <p id="mode-badge">✦ CELL MODE</p>
        <div id="rl-wrap">
            <div id="rl-label">
                <span>Tokens</span>
                <span id="rl-count">50 / 50</span>
            </div>
            <div id="rl-track">
                <div id="rl-fill"></div>
            </div>
        </div>
        <p id="help">Click to spawn · Drag to pan · Scroll to zoom</p>
    </div>

    <!-- Shape Picker -->
    <div id="shape-panel">
        <div id="shape-panel-header">
            <div id="header-text">
                <h4>📐 Shapes</h4>
                <div id="category-tabs"><!-- populated by JS --></div>
            </div>
            <button id="panel-toggle" title="Collapse / expand shape panel">◀</button>
        </div>
        <div class="panel-body" id="shape-list-wrap" style="display:contents">
            <div id="shape-list"><!-- populated by JS --></div>
            <div id="shape-panel-footer">
                <button id="open-editor-btn">✏ Create Custom Piece</button>
                <button id="clear-btn">✕ Deselect shape [Esc]</button>
                Click a shape then click the grid to place it.
            </div>
        </div>
    </div>

    <canvas id="grid" style="cursor: crosshair;"></canvas>

    <!-- Piece Editor Modal -->
    <div id="piece-editor-overlay">
        <div id="piece-editor">
            <div id="editor-header">
                <h3>✏ Piece Editor</h3>
                <button id="editor-close" title="Close editor">✕</button>
            </div>

            <div id="editor-meta">
                <div class="editor-field">
                    <label for="editor-key">Key (unique id)</label>
                    <input type="text" id="editor-key" placeholder="my-glider" />
                </div>
                <div class="editor-field">
                    <label for="editor-label">Display name</label>
                    <input type="text" id="editor-label" placeholder="My Glider" />
                </div>
                <div class="editor-field">
                    <label for="editor-category">Category</label>
                    <input type="text" id="editor-category" placeholder="Custom" />
                </div>
            </div>

            <div id="editor-toolbar">
                <button class="ed-btn active" id="ed-draw-btn" title="Draw mode">✦ Draw</button>
                <button class="ed-btn" id="ed-erase-btn" title="Erase mode">◻ Erase</button>
                <button class="ed-btn" id="ed-clear-btn" title="Clear all cells">⟳ Clear All</button>
                <button class="ed-btn" id="ed-center-btn" title="Re-center view">⊕ Re-center</button>
                <span id="editor-cell-count">0 cells</span>
            </div>

            <div id="editor-canvas-wrap">
                <canvas id="editor-canvas" width="500" height="500"></canvas>
            </div>
            <div id="editor-zoom-info">Scroll to zoom · Drag to pan · Click/drag to paint</div>

            <div id="editor-footer">
                <button id="editor-cancel">Cancel</button>
                <button id="editor-accept">✓ Add to Catalog</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
