<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Distributed Game of Life</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #121212; color: #fff; font-family: sans-serif; }
        canvas { display: block; }
        #ui { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.7); padding: 10px; border-radius: 5px; pointer-events: none; }
    </style>
</head>
<body>
    <div id="ui">
        <h3>Viewport</h3>
        <p>Click to spawn cells</p>
        <p id="status">Connecting...</p>
    </div>
    <canvas id="grid"></canvas>
    <script src="app.js"></script>
</body>
</html>
