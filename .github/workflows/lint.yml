name: Lint

on:
  push:
    branches:
      - development

  # Also gate every PR regardless of target branch so nothing broken
  # can be merged into staging or main.
  pull_request:

jobs:
  lint:
    name: Lint & vet
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: go vet
        run: go vet ./...

      - name: staticcheck
        uses: dominikh/staticcheck-action@v1
        with:
          version: latest
          install-go: false   # already installed above
